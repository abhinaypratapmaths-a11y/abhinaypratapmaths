<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATHS | RESULT 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --gold: #fbbf24;
            --dark: #000;
            --kvs-grad: linear-gradient(135deg, #ea580c, #9a3412);
            --board-grad: linear-gradient(135deg, #0284c7, #075985);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: #fff;
            margin: 0;
            padding-bottom: 80px;
            background: radial-gradient(circle at 10% 10%, #1e3a8a 0%, transparent 35%);
        }

        /*  New Straight Header - Single Line */
        nav {
            background: rgba(0,0,0,0.98);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
            position: sticky; 
            top: 0; 
            z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .nav-brand { 
            font-family: 'Montserrat'; 
            font-size: clamp(18px, 4vw, 32px); 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 3px;
            white-space: nowrap; /* Ensures straight line */
        }

        header { padding: 60px 20px 30px 20px; text-align: center; }
        .main-title { font-family: 'Montserrat'; font-size: clamp(30px, 6vw, 80px); margin: 0; text-transform: uppercase; letter-spacing: -1px; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .success-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }

        .result-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .result-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .banner-box { position: relative; width: 100%; padding-top: 100%; background: #111; overflow: hidden; }
        .banner-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .result-card:hover .banner-box img { transform: scale(1.08); }

        .detail-panel { padding: 25px 20px; text-align: center; color: #1e293b; }
        .detail-panel h3 { margin: 0; font-size: 22px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
        .school-txt { margin: 5px 0; font-size: 13px; font-weight: 600; color: #64748b; }
        .roll-badge { display: inline-block; margin-top: 10px; padding: 4px 15px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 50px; font-size: 12px; font-weight: 700; color: var(--primary); }

        .category-tag { position: absolute; top: 15px; right: 15px; z-index: 10; padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: 800; color: #fff; }

        #msg-bot { position: fixed; bottom: 80px; right: 25px; z-index: 1100; display: flex; align-items: center; cursor: pointer; }
        .msg-face { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; overflow: hidden; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .msg-face img { width: 100%; height: 100%; object-fit: cover; }
        .msg-bubble { background: #fff; color: #000; padding: 10px 20px; border-radius: 25px 25px 0 25px; margin-right: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .ticker-wrap { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--gold); color: #000; padding: 12px 0; overflow: hidden; white-space: nowrap; font-weight: 800; z-index: 999; }
        .ticker-move { display: inline-block; animation: slide 30s linear infinite; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; justify-content: center; align-items: center; }
        #viewer img { max-width: 90%; max-height: 85%; border: 4px solid var(--gold); border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<nav>
    <div class="nav-brand">AP MATHEMATICS RESULT 2026</div>
</nav>

<header>
    <h1 class="main-title">HALL OF FAME</h1>
    <p style="color: #64748b; font-weight: 600; letter-spacing: 4px; margin-top: 10px;">PROUD MOMENTS OF OUR SELECTED STUDENTS</p>
</header>

<div class="container">
    <div class="success-grid" id="mainGrid">
        </div>
</div>

<div id="msg-bot" onclick="window.open('https://wa.me/919670078465')">
    <div class="msg-bubble">Congratulations to our brilliant students!</div>
    <div class="msg-face"><img src="aa.png" onerror="this.src='https://via.placeholder.com/70'"></div>
</div>

<div class="ticker-wrap">
    <div class="ticker-move" id="news"></div>
</div>

<div id="viewer" onclick="this.style.display='none'">
    <img id="vImg" src="">
</div>

<script>
    const studentResults = [
        { name: "COMMING SOON", school: "School Name Here", roll: "Roll No: 123456", type: "BOARD", img: "std1.jpg", achievement: "78% In 10th Boards (Selected Student)" },
        { name: "Student Name 2", school: "School Name Here", roll: "Roll No: 789012", type: "KVS", img: "std2.jpg", achievement: "KVS Entrance Qualified (Selected Student)" },
        { name: "Student Name 3", school: "School Name Here", roll: "Roll No: 345678", type: "BOARD", img: "std3.jpg", achievement: "95/100 In Maths (Selected Student)" },
        { name: "Student Name 4", school: "School Name Here", roll: "Roll No: 901234", type: "NVS", img: "std4.jpg", achievement: "NVS Entrance Qualified (Selected Student)" }
    ];

    const grid = document.getElementById('mainGrid');
    const news = document.getElementById('news');

    function render() {
        let tickerText = "";
        grid.innerHTML = "";

        studentResults.forEach(s => {
            const grad = s.type === 'BOARD' ? 'var(--board-grad)' : 'var(--kvs-grad)';
            
            grid.innerHTML += `
                <div class="result-card" onclick="openFull('${s.img}')">
                    <div class="banner-box">
                        <div class="category-tag" style="background:${grad}">${s.type} SUCCESS</div>
                        <img src="${s.img}" onerror="this.src='https://via.placeholder.com/1080/111/fff?text=${s.name}'">
                    </div>
                    <div class="detail-panel">
                        <h3>${s.name}</h3>
                        <div class="school-txt">${s.school}</div>
                        <div style="font-weight:800; color:var(--primary); font-size:14px; margin-top:5px;">${s.achievement}</div>
                        <div class="roll-badge">${s.roll}</div>
                    </div>
                </div>
            `;
            tickerText += `  CONGRATULATIONS TO ${s.name.toUpperCase()} (${s.achievement}) | `;
        });
        news.innerText =  " ADMISSION OPEN FOR SESSION 2026-27 | JOIN AP MATHEMATICS TODAY|| ENROLL NOW OUR PREMIUM LAKSHAY FOUNDATION BATCH FOR BETTER RESULTS 🎉🎉";
    }

    function openFull(src) {
        document.getElementById('vImg').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    render();
</script>
</body>
</html>
