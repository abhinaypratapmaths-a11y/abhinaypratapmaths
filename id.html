<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ExamEdge Result</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --navy: #070b14; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* DIRECTOR MESSAGE BANNER - Fixed Image Alignment */
        .hero-section { 
            position: relative; width: 100%; height: 320px; 
            background: url('ii.png') top center/cover no-repeat; 
            display: flex; align-items: flex-end; justify-content: center;
        }
        .hero-section::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, var(--navy), rgba(0,0,0,0.6)); }
        
        .msg-container { position: relative; z-index: 2; width: 85%; margin-bottom: 30px; }
        .director-tag { color: var(--gold); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .marquee-box { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; overflow: hidden; }
        .marquee-text { color: #fff; font-size: 1rem; font-weight: 500; white-space: nowrap; animation: scrollText 15s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* RESULT TITLE - Small & Clean */
        .title-header { text-align: center; color: #94a3b8; font-size: 0.8rem; margin: 40px 0; text-transform: uppercase; letter-spacing: 4px; }
        
        /* VERTICAL GRID - One card under another */
        .fame-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            max-width: 400px; 
            margin: auto; 
            padding: 0 20px; 
        }
        
        .fame-card { background: rgba(30, 41, 59, 0.6); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .fame-card:hover { border-color: #fff; }
        
        .stu-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #fff; margin-bottom: 15px; object-fit: cover; }
        .stu-name { color: white; font-weight: 800; font-size: 1rem; }
        .marks-badge { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-top: 10px; display: inline-block; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="hero-section">
        <div class="msg-container">
            <div class="director-tag">DIRECTOR MESSAGE</div>
            <div class="marquee-box">
                <div class="marquee-text">"APKA SAPNA, HAMARA SANKALP - EXAMEDGE ONLINE KI MEHNAT SE SAFALTA KA PARAKRAM!"</div>
            </div>
        </div>
    </div>

    <!-- Small Font Title -->
    <h1 class="title-header">EXAMEDGE RESULT</h1>

    <!-- Vertical List -->
    <div class="fame-grid">
        <div class="fame-card">
            <img src="logo.png" class="stu-img">
            <div class="stu-name">Rahul Sharma</div>
            <div class="marks-badge">98% Marks</div>
            <div style="color:#aaa; font-size: 11px; margin-top:8px;">SANKALP BATCH</div>
        </div>
        <div class="fame-card">
            <img src="logo.png" class="stu-img">
            <div class="stu-name">Priya Singh</div>
            <div class="marks-badge">96% Marks</div>
            <div style="color:#aaa; font-size: 11px; margin-top:8px;">PRAKRAM BATCH</div>
        </div>
        <div class="fame-card">
            <img src="logo.png" class="stu-img">
            <div class="stu-name">Aman Verma</div>
            <div class="marks-badge">95% Marks</div>
            <div style="color:#aaa; font-size: 11px; margin-top:8px;">LAKSHYA BATCH</div>
        </div>
    </div>

</body>
</html>
