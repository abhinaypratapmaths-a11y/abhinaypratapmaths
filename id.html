<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamEdge Result</title>
    <style>
        :root { --gold: #ffcc00; --navy: #070b14; }
        body { 
            background: var(--navy); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            /* Background image poore page par fixed rahegi */
            background: url('ii.png') no-repeat center center fixed; 
            background-size: cover;
        }
        
        /* Dark overlay taaki content clear dikhe */
        .page-wrapper { background: rgba(7, 11, 20, 0.85); min-height: 100vh; padding-bottom: 50px; }

        /* Banner */
        .hero-section { width: 100%; height: 250px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; }
        
        .msg-container { width: 90%; }
        .director-tag { color: var(--gold); font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .marquee-box { background: rgba(0,0,0,0.8); border: 2px solid var(--gold); padding: 15px; border-radius: 10px; overflow: hidden; }
        .marquee-text { color: #fff; font-size: 1.2rem; font-weight: 600; white-space: nowrap; animation: scrollText 15s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .title-header { text-align: center; color: #94a3b8; font-size: 1rem; margin: 40px 0; text-transform: uppercase; letter-spacing: 5px; }
        
        /* Bada Bada Card Layout */
        .fame-grid { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 500px; margin: auto; padding: 0 20px; }
        
        .fame-card { 
            background: rgba(30, 41, 59, 0.8); 
            border: 3px solid var(--gold); 
            border-radius: 30px; 
            padding: 40px 20px; 
            text-align: center; 
        }
        
        .stu-img { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #fff; margin-bottom: 20px; object-fit: cover; }
        .stu-name { color: white; font-weight: 800; font-size: 1.5rem; }
        .marks-badge { background: var(--gold); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; margin-top: 15px; display: inline-block; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="hero-section">
        <div class="msg-container">
            <div class="director-tag">DIRECTOR MESSAGE</div>
            <div class="marquee-box">
                <div class="marquee-text">"APKA SAPNA, HAMARA SANKALP - EXAMEDGE ONLINE KI MEHNAT SE SAFALTA KA PARAKRAM!"</div>
            </div>
        </div>
    </div>

    <h1 class="title-header">EXAMEDGE RESULT</h1>

    <div class="fame-grid">
        <div class="fame-card">
            <img src="logo.png" class="stu-img">
            <div class="stu-name">Rahul Sharma</div>
            <div class="marks-badge">98% Marks</div>
            <div style="color:white; font-size: 1rem; margin-top:10px; font-weight:bold;">SANKALP BATCH</div>
        </div>
        <div class="fame-card">
            <img src="logo.png" class="stu-img">
            <div class="stu-name">Priya Singh</div>
            <div class="marks-badge">96% Marks</div>
            <div style="color:white; font-size: 1rem; margin-top:10px; font-weight:bold;">PRAKRAM BATCH</div>
        </div>
    </div>
</div>

</body>
</html>
