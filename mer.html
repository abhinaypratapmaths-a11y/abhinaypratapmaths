<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATHEMATICS | STUDY HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ffd5; 
            --bg: radial-gradient(circle at top, #0f172a, #020617); 
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-transform: uppercase;
        }

        .hub-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .hub-title {
            color: var(--primary);
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 213, 0.3);
        }

        .book-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .book-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .subject-img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
            background: #000;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.2);
        }

        .book-info {
            flex-grow: 1;
            text-align: left;
        }

        .book-name {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            display: block;
            margin-bottom: 2px;
        }

        .book-meta {
            font-size: 10px;
            color: var(--primary);
            font-weight: 700;
            opacity: 0.9;
        }

        .author-tag {
            font-size: 9px;
            color: #94a3b8;
            margin-top: 5px;
            display: block;
        }

        .dl-icon {
            background: var(--primary);
            color: #000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 255, 213, 0.3);
        }

        .book-card:hover .dl-icon {
            transform: rotate(360deg);
            background: #fff;
        }

        .premium-tag {
            position: absolute;
            top: 0;
            right: 0;
            background: #f59e0b;
            color: #000;
            font-size: 8px;
            padding: 3px 12px;
            font-weight: 900;
            border-bottom-left-radius: 12px;
        }
    </style>
</head>
<body>

<div class="hub-container">
    <h1 class="hub-title">📚 STUDY HUB</h1>

    <div class="book-list">
        
        <a href="https://drive.google.com/file/d/1qWUmbfsqulxXlHnEmUOR6Ap-ChaIATYB/view?usp=drivesdk" target="_blank" class="book-card">
            <div class="premium-tag">FREE PDF</div>
            <img src="subject1.png" class="subject-img" alt="Arithmetic">
            <div class="book-info">
                <span class="book-name">ARITHMETIC SPECIAL</span>
                <span class="book-meta">COMPLETE FOUNDATION NOTES</span>
                <span class="author-tag">BY ABHINAY PRATAP (MATHS MYSTIC)</span>
            </div>
            <div class="dl-icon">↓</div>
        </a>

        <a href="YOUR_DOWNLOAD_LINK_2" target="_blank" class="book-card">
            <div class="premium-tag">NEW</div>
            <img src="subject2.png" class="subject-img" alt="Geometry">
            <div class="book-info">
                <span class="book-name">GEOMETRY BRAHMASTRA</span>
                <span class="book-meta">ADVANCE MATHS SERIES</span>
                <span class="author-tag">AP MATHEMATICS FOUNDATION</span>
            </div>
            <div class="dl-icon">↓</div>
        </a>

        <a href="YOUR_DOWNLOAD_LINK_3" target="_blank" class="book-card">
            <div class="premium-tag">BESTSELLER</div>
            <img src="subject3.png" class="subject-img" alt="Formula Book">
            <div class="book-info">
                <span class="book-name">MATHS FORMULA E-BOOK</span>
                <span class="book-meta">ALL COMPETITIVE EXAMS</span>
                <span class="author-tag">TEAM AAZAD TRUST SPECIAL</span>
            </div>
            <div class="dl-icon">↓</div>
        </a>

    </div>
</div>

</body>
</html>
