<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARRIOR LMS | AP MATHEMATICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --gold: #ffcc00;
            --navy: #0f172a;
            --card-bg: #1e293b;
            --text: #ffffff;
            --btn-blue: linear-gradient(135deg, #00d2ff, #3a7bd5);
            --bg-hover: rgba(255, 255, 255, 0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; text-decoration: none !important; -webkit-tap-highlight-color: transparent; }
        body { background: var(--navy); color: var(--text); overflow-x: hidden; }

        /* TOPBAR */
        .topbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(15, 23, 42, 0.98); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 2000; border-bottom: 2px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .top-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { font-size: 24px; color: var(--primary); cursor: pointer; transition: 0.3s; }
        .back-btn:hover { color: var(--gold); transform: translateX(-3px); }
        .batch-name { font-weight: 800; font-size: 16px; letter-spacing: 1px; color: #fff; }
        .top-right-logo img { height: 40px; border-radius: 50%; border: 2px solid var(--gold); }

        /* MAIN LAYOUT */
        .lms-container { margin-top: 85px; padding: 10px 15px; max-width: 1250px; margin-left: auto; margin-right: auto; display: flex; flex-direction: column; gap: 20px; }
        
        @media (min-width: 950px) {
            .lms-container { flex-direction: row; align-items: flex-start; }
            .left-panel { flex: 2.2; position: sticky; top: 90px; }
            .right-panel { flex: 1.1; min-width: 350px; max-width: 400px; }
        }

        /* ---------------- LEFT PANEL (VIDEO + INFO) ---------------- */
        .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Live Badge for Video */
        .live-badge { position: absolute; top: 15px; left: 15px; background: red; color: white; padding: 5px 12px; border-radius: 5px; font-weight: 800; font-size: 11px; display: flex; align-items: center; gap: 5px; animation: pulseLive 1.5s infinite; z-index: 10; pointer-events: none; }
        @keyframes pulseLive { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .class-info { background: var(--card-bg); padding: 22px; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .class-title { font-size: 20px; font-weight: 800; color: var(--gold); margin-bottom: 10px; line-height: 1.3; }
        .class-desc { font-size: 14px; color: #cbd5e1; text-transform: none; line-height: 1.6; margin-bottom: 20px; background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .notes-btn { background: var(--primary); color: white; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; font-size: 14px; letter-spacing: 1px; width: 100%; justify-content: center; }
        @media (min-width: 600px) { .notes-btn { width: auto; } }
        .notes-btn:hover { background: #cc0000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,0,0.4); }

        /* ---------------- RIGHT PANEL (TABS: PLAYLIST & CHAT) ---------------- */
        .right-panel { background: var(--card-bg); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .panel-tabs { display: flex; background: #070b14; border-bottom: 2px solid #334155; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #94a3b8; font-weight: 800; font-size: 14px; border-bottom: 3px solid transparent; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255, 204, 0, 0.05); }

        .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .tab-content.active { display: flex; }

        /* --- PLAYLIST TAB --- */
        .playlist-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .playlist-item { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; align-items: center; }
        .playlist-item:hover { background: var(--bg-hover); }
        .playlist-item.active { background: rgba(255, 204, 0, 0.08); border-left: 4px solid var(--gold); }
        
        .play-icon { width: 40px; height: 40px; border-radius: 50%; background: #0f172a; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 14px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
        .playlist-item.active .play-icon { background: var(--primary); color: white; border-color: var(--primary); animation: pulsePlay 1.5s infinite; }
        @keyframes pulsePlay { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
        
        .item-details { flex: 1; }
        .item-title { font-size: 13px; font-weight: 700; color: #e2e8f0; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .item-duration { font-size: 11px; color: #64748b; font-weight: 800; display: flex; gap: 5px; align-items: center; }
        .playlist-item.active .item-title { color: var(--gold); }

        /* --- CHAT TAB --- */
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #0f172a; }
        .msg { display: flex; flex-direction: column; gap: 3px; text-transform: none; }
        .msg-name { font-size: 11px; font-weight: 800; color: #cbd5e1; display: flex; align-items: center; gap: 5px; }
        .admin-badge { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }
        .msg-text { font-size: 13px; background: #1e293b; padding: 10px 14px; border-radius: 0 12px 12px 12px; color: white; align-self: flex-start; max-width: 85%; border: 1px solid rgba(255,255,255,0.05); line-height: 1.4; }
        
        .my-msg .msg-name { color: #38bdf8; align-self: flex-end; }
        .my-msg .msg-text { background: var(--primary); align-self: flex-end; border-radius: 12px 0 12px 12px; border: none; }
        .admin-msg .msg-name { color: var(--gold); }

        .chat-input-box { display: flex; padding: 12px; background: #070b14; border-top: 1px solid rgba(255,255,255,0.1); gap: 10px; align-items: center; }
        .chat-input-box input { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 12px 15px; border-radius: 25px; outline: none; text-transform: none; font-size: 14px; }
        .chat-input-box button { background: var(--btn-blue); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .chat-input-box button:hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        /* Custom Scrollbar for panels */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #070b14; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- TOP NAV -->
    <div class="topbar">
        <div class="top-left">
            <a href="student.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <!-- Yahan aap class/batch ka naam likh sakte hain -->
            <div class="batch-name">EXAMEDGE LECTURE</div>
        </div>
        <div class="top-right-logo">
            <img src="ii.png" alt="EXAMEDGE ONLINE">
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="lms-container">
        
        <!-- LEFT: VIDEO & INFO -->
        <div class="left-panel">
            <div class="video-box">
                <div class="live-badge" id="liveBadge" style="display:none;"><i class="fas fa-circle"></i> LIVE</div>
                <div class="video-wrapper">
                    <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>

            <div class="class-info">
                <div class="class-title" id="currentTitle">Class Title Here</div>
                <div class="class-desc" id="currentDesc">Class description...</div>
                
                <a href="#" id="currentPdfBtn" target="_blank" class="notes-btn">
                    <i class="fas fa-download"></i> CLASS NOTES (PDF)
                </a>
            </div>
        </div>

        <!-- RIGHT: PLAYLIST & CHAT -->
        <div class="right-panel">
            
            <!-- TABS BUTTONS -->
            <div class="panel-tabs">
                <div class="tab-btn active" onclick="switchTab('playlist')" id="btn-playlist">
                    <i class="fas fa-list-ul"></i> CONTENT
                </div>
                <div class="tab-btn" onclick="switchTab('chat')" id="btn-chat">
                    <i class="fas fa-comments"></i> LIVE CHAT
                </div>
            </div>

            <!-- TAB 1: PLAYLIST -->
            <div class="tab-content active" id="tab-playlist">
                <div style="padding: 12px 15px; font-size: 12px; color: var(--gold); font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0f172a;">
                    <i class="fas fa-video"></i> TOTAL VIDEOS: <span id="totalVideosCount">0</span>
                </div>
                <div class="playlist-items" id="playlistContainer">
                    <!-- Javascript will load videos here -->
                </div>
            </div>

            <!-- TAB 2: LIVE CHAT -->
            <div class="tab-content" id="tab-chat">
                <div style="padding: 12px 15px; font-size: 12px; color: #22c55e; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0f172a; text-align: center;">
                    <i class="fas fa-users"></i> CHAT ROOM IS OPEN
                </div>
                
                <div class="chat-area" id="chatBox">
                    <!-- Pre-loaded / Welcome Message -->
                    <div class="msg admin-msg">
                        <div class="msg-name">EXAMEDGE ONLINE<span class="admin-badge"><i class="fas fa-check-circle"></i> ADMIN</span></div>
                        <div class="msg-text">Welcome to the Live Class! Agar koi doubt ho toh yahan puch sakte hain. Padhte rahiye! 🚀</div>
                    </div>
                </div>

                <div class="chat-input-box">
                    <input type="text" id="chatInput" placeholder="Apna sawal likhein...">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        /* 
        =========================================================
        [ STEP 1 ] YAHAN APNE VIDEOS AUR PDF KE LINK ADD KAREIN
        =========================================================
        - videoId: Youtube link ka aakhiri ID
        - isLive: true (agar live chat/badge dikhana hai), false (agar recorded hai)
        */

        const courseData = [
            {
                videoId: "jfKfPfyJRdk", 
                title: "Class 01: Real Numbers (वास्तविक संख्याएँ) - Full Concept",
                desc: "Is class mein hum Number System aur Real numbers ke basics aur NCERT ke questions cover karenge. Pura focus concept clarity par rahega.",
                duration: "1:20:45",
                isLive: true, // Ise true rakhenge toh video pe 'LIVE' likha aayega
                pdfLink: "https://example.com/notes_class1.pdf" 
            },
            {
                videoId: "oZBf5CXbov4", 
                title: "Class 02: Polynomials (बहुपद) Part 1",
                desc: "Polynomials ka pura basic structure, zeroes of polynomial aur unke relations ko detail mein samjhaya gaya hai.",
                duration: "55:30",
                isLive: false,
                pdfLink: "https://example.com/notes_class2.pdf" 
            },
            {
                videoId: "jfKfPfyJRdk", // Dummy
                title: "Class 03: Linear Equations Trick",
                desc: "Do char wale linear equations ko solve karne ki best tricks aur graph method.",
                duration: "1:05:12",
                isLive: false,
                pdfLink: "" // Blank chhodne par button gayab ho jayega
            }
        ];

        /* ========================================================= */

        let currentIndex = 0;

        // --- PLAYLIST RENDER FUNCTION ---
        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            document.getElementById('totalVideosCount').innerText = courseData.length;
            container.innerHTML = '';

            courseData.forEach((item, index) => {
                const isActive = index === currentIndex ? 'active' : '';
                const icon = index === currentIndex ? '<i class="fas fa-play"></i>' : `<i class="fas fa-lock-open"></i>`;
                const liveTag = item.isLive ? `<span style="color:red; font-size:10px; margin-left:5px;">[LIVE]</span>` : '';
                
                const html = `
                    <div class="playlist-item ${isActive}" onclick="loadVideo(${index})">
                        <div class="play-icon">${icon}</div>
                        <div class="item-details">
                            <div class="item-title">${index + 1}. ${item.title} ${liveTag}</div>
                            <div class="item-duration"><i class="far fa-clock"></i> ${item.duration}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // --- LOAD VIDEO FUNCTION ---
        function loadVideo(index) {
            currentIndex = index;
            const data = courseData[index];

            // Set Youtube Video
            document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${data.videoId}?autoplay=1&rel=0&modestbranding=1`;
            
            // Set Text Data
            document.getElementById('currentTitle').innerText = data.title;
            document.getElementById('currentDesc').innerText = data.desc;
            
            // Manage Live Badge
            document.getElementById('liveBadge').style.display = data.isLive ? 'flex' : 'none';

            // Manage PDF Button
            const pdfBtn = document.getElementById('currentPdfBtn');
            if(data.pdfLink && data.pdfLink !== "") {
                pdfBtn.style.display = "inline-flex";
                pdfBtn.href = data.pdfLink;
            } else {
                pdfBtn.style.display = "none";
            }

            renderPlaylist();
        }

        // --- TAB SWITCHER FUNCTION (PLAYLIST VS CHAT) ---
        function switchTab(tabName) {
            // Buttons
            document.getElementById('btn-playlist').classList.remove('active');
            document.getElementById('btn-chat').classList.remove('active');
            document.getElementById('btn-' + tabName).classList.add('active');

            // Content
            document.getElementById('tab-playlist').classList.remove('active');
            document.getElementById('tab-chat').classList.remove('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // --- LIVE CHAT FUNCTION ---
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const chatBox = document.getElementById('chatBox');
            const msg = input.value.trim();
            
            if(msg === "") return;

            // Student Message Insert
            const msgHTML = `
                <div class="msg my-msg">
                    <div class="msg-name">Student (You)</div>
                    <div class="msg-text">${msg}</div>
                </div>
            `;
            chatBox.innerHTML += msgHTML;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Auto-Reply from Admin (Ek mast effect ke liye)
            setTimeout(() => {
                const replyHTML = `
                    <div class="msg admin-msg">
                        <div class="msg-name">AP MATHS <span class="admin-badge"><i class="fas fa-check-circle"></i></span></div>
                        <div class="msg-text">Apka message receive ho gaya hai. Sir jaldi hi iska jawab denge!</div>
                    </div>
                `;
                chatBox.innerHTML += replyHTML;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1500); // 1.5 seconds baad reply aayega
        }

        // Keyboard "Enter" key se message bhejna
        document.getElementById("chatInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        // PAGE LOAD HOTE HI FIRST VIDEO CHALAYEIN
        window.onload = () => {
            loadVideo(0);
        };

    </script>
</body>
</html>
