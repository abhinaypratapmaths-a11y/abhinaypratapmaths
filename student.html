<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDENT REGISTRATION</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  text-transform:uppercase;
}

body{
  background:linear-gradient(135deg,#ffe6e6,#fff0f0);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  background:white;
  width:100%;
  max-width:750px;
  padding:35px;
  border:4px solid red; /* container border red */
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  border-radius:15px;
  text-align:center;
}

.container img.logo{
  width:150px;
  height:auto;
  margin-bottom:20px;
}

h3{
  color:#b30000;
  margin-bottom:25px;
  font-weight:700;
}

.input-group{
  margin-bottom:18px;
  text-align:left;
}

label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
  color:red;
}

input, select{
  width:100%;
  padding:12px;
  border:2px solid red;
  outline:none;
  font-size:14px;
  border-radius:6px;
  background:#e6f0ff; /* all boxes blue */
}

input:focus, select:focus{
  border-color:#142850;
  box-shadow:0 0 6px rgba(0,0,255,0.3);
}

.upi-box, .fee-box, #discountInfo{
  background:#e6f0ff;
  padding:10px;
  border:2px solid red;
  font-weight:600;
  color:red;
  border-radius:6px;
  margin-top:5px;
  display:none;
}

button{
  width:100%;
  padding:13px;
  background:red;
  color:white;
  border:none;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  border-radius:6px;
}

button:hover{
  background:#b30000;
}

.message{
  margin-top:15px;
  text-align:center;
  font-weight:700;
}

.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="container">
<!-- Replace src with your institute logo -->
<img src="alogo.png" alt="INSTITUTE LOGO" class="logo">

<h3>REGISTRATION FORM</h3>

<form id="regForm">

<div class="input-group">
<label>SELECT COURSE</label>
<select id="course" onchange="showFee()">
<option value="">-- SELECT COURSE --</option>
<option value="2199">LAKSHYA FOUNDATION BATCH</option>
<option value="2199">SANKALP FOUNDATION BATCH</option>
<option value="4999">MATHS SPECIAL BATCH</option>
</select>
<div id="feeDisplay" class="fee-box"></div>
</div>

<div class="input-group">
<label>COUPON CODE</label>
<input type="text" id="coupon" placeholder="APPLY COUPAN FOR DISCOUNT">
<button type="button" onclick="applyCoupon()">APPLY COUPON</button>
<div id="discountInfo"></div>
</div>

<div class="input-group">
<label>NAME</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>FATHER NAME</label>
<input type="text" id="father">
</div>

<div class="input-group">
<label>MOTHER NAME</label>
<input type="text" id="mother">
</div>

<div class="input-group">
<label>DOB</label>
<input type="date" id="dob">
</div>

<div class="input-group">
<label>MOBILE</label>
<input type="number" id="mobile">
</div>

<div class="input-group">
<label>WHATSAPP</label>
<input type="number" id="whatsapp">
</div>

<div class="input-group">
<label>EMAIL</label>
<input type="email" id="email" value="@gmail.com">
</div>

<div class="input-group">
<label>AADHAR</label>
<input type="number" id="aadhar">
</div>

<div class="input-group">
<label>PAY ON UPI ID</label>
<div class="upi-box">7705042892@axl</div>
</div>

<div class="input-group">
<label>ENTER UTR</label>
<input type="text" id="utr" placeholder="XXXXXXXX">
</div>

<button type="button" onclick="register()">REGISTER NOW</button>

<div id="message" class="message"></div>

</form>
</div>

<script>
let originalFee = 0;
let discountedFee = 0;

function showFee(){
    let course = document.getElementById("course");
    let feeBox = document.getElementById("feeDisplay");
    if(course.value !== ""){
        originalFee = parseInt(course.value);
        discountedFee = originalFee;
        feeBox.style.display = "block";
        feeBox.innerHTML = "COURSE FEE: ₹ "+originalFee;
        document.getElementById("discountInfo").style.display="none";
    } else {
        feeBox.style.display="none";
        document.getElementById("discountInfo").style.display="none";
        originalFee=0;
        discountedFee=0;
    }
}

function applyCoupon(){
    let coupon = document.getElementById("coupon").value.toUpperCase();
    let discountBox = document.getElementById("discountInfo");

    if(!originalFee){
        alert("PLEASE SELECT COURSE FIRST");
        return;
    }

    if(coupon.startsWith("ABHINAY") && coupon.length>7){
        let percent = parseInt(coupon.slice(7));
        if(!isNaN(percent) && percent>0 && percent<=100){
            discountedFee = Math.round(originalFee*(1-percent/100));
            discountBox.style.display = "block";
            discountBox.innerHTML = "DISCOUNTED FEE: ₹ "+discountedFee+" ("+percent+"% OFF)";
            showMessage("COUPON APPLIED ✅","success");
        } else {
            showMessage("INVALID COUPON ❌","error");
        }
    } else {
        showMessage("INVALID COUPON ❌","error");
    }
}

function register(){
    let fields = ["course","name","father","mother","dob","mobile","whatsapp","email","aadhar","utr"];
    for(let i=0;i<fields.length;i++){
        if(document.getElementById(fields[i]).value.trim()===""){
            showMessage("PLEASE FILL ALL DETAILS ❌","error");
            return;
        }
    }

    let studentId = "APM"+Date.now();
    showMessage("REGISTRATION SUCCESSFUL ✅ YOUR ID: "+studentId,"success");

    // Reset form
    setTimeout(()=>{
        document.getElementById("regForm").reset();
        document.getElementById("feeDisplay").style.display="none";
        document.getElementById("discountInfo").style.display="none";
    },10000);
}

function showMessage(msg,type){
    let box = document.getElementById("message");
    box.innerHTML = msg;
    box.className = "message "+type;
}
</script>

</body>
</html>
