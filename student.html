<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM ADMISSION PORTAL | AP MATHEMATICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --dark: #0f172a; --success: #10b981; --gray: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        
        body { 
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e0 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }

        .container { 
            background: white; width: 100%; max-width: 850px; 
            border-radius: 30px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.8); overflow: hidden; 
        }

        .header { 
            background: var(--dark); color: white; padding: 40px 20px; 
            text-align: center; border-bottom: 8px solid var(--primary);
        }

        .header h1 { font-size: 32px; letter-spacing: 2px; font-weight: 800; }
        .header p { font-size: 12px; color: #94a3b8; margin-top: 8px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 40px; }
        .full { grid-column: span 2; }

        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 800; color: #475569; }

        input, select, textarea { 
            padding: 16px; border-radius: 15px; border: 2px solid #e2e8f0; 
            background: #f8fafc; font-size: 14px; font-weight: 600; 
            transition: 0.3s ease; color: var(--dark);
        }

        input:focus { border-color: var(--primary); outline: none; background: white; }

        .fee-status { 
            background: #fff1f1; padding: 25px; border-radius: 20px; 
            border: 2px dashed var(--primary); margin-top: 10px;
        }

        .btn-pay { 
            width: 100%; padding: 20px; background: var(--primary); color: white; 
            border: none; border-radius: 18px; font-size: 16px; font-weight: 800; 
            cursor: pointer; transition: 0.4s; box-shadow: 0 15px 30px rgba(211, 47, 47, 0.3);
        }

        /* Payment Modal */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            z-index: 100; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: white; padding: 30px; border-radius: 35px; 
            max-width: 480px; width: 100%; text-align: center; max-height: 90vh; overflow-y: auto;
        }

        .qr-box { 
            width: 200px; height: 200px; background: white; margin: 10px auto; 
            border-radius: 20px; border: 3px solid var(--dark); padding: 10px;
        }

        .bank-details { 
            background: #f8fafc; border-radius: 20px; padding: 15px; 
            text-align: left; border: 1px solid #e2e8f0; margin: 15px 0;
        }

        .bank-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .bank-label { font-weight: 700; color: var(--gray); }
        .bank-value { font-weight: 800; color: var(--dark); }

        /* Success Card */
        #successCard { display: none; padding: 60px 40px; text-align: center; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>AP MATHEMATICS</h1>
        <p>POWERED BY ABHINAY PRATAP MATHS (MATHS MYSTIC)</p>
    </div>
    <form id="admissionForm" class="form-grid">
        <div class="field full">
            <label>CHOOSE YOUR BATCH <span>*</span></label>
            <select id="course" onchange="updateFee()">
                <option value="">-- SELECT OUR COURSE --</option>
                <option value="500">REGISTRATION FEE</option>
                <option value="2199">LAKSHYA FOUNDATION BATCH </option>
                <option value="2499">ENTRENCE EXAM FOUNDATION</option>
                <option value="2199">SANKALP FOUNDATION BATCH </option>
                <option value="3000" data-type="special">MATHS SPECIAL 2026 </option>
            </select>
        </div>
        
        <div class="field full">
            <label>COUPON CODE</label>
            <div style="display:flex; gap:12px;">
                <input type="text" id="coupon" placeholder="ENTER VALID COUPON" style="flex:1;">
                <button type="button" onclick="applyCoupon()" style="padding:0 25px; background:var(--dark); color:white; border-radius:15px; border:none; cursor:pointer; font-weight:700;">APPLY</button>
            </div>
        </div>

        <div class="field full fee-status" id="feeDisplay" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; color:var(--dark);">FINAL PAYABLE:</span>
                <span id="finalPrice" style="font-size:26px; font-weight:900; color:var(--primary);">₹0</span>
            </div>
        </div>

        <div class="field"><label>STUDENT NAME</label><input type="text" id="sName"></div>
        <div class="field"><label>FATHER'S NAME</label><input type="text" id="fName"></div>
        <div class="field"><label>MOTHER'S NAME</label><input type="text" id="mName"></div>
        <div class="field"><label>DATE OF BIRTH</label><input type="date" id="dob"></div>
        <div class="field"><label>AADHAR NO. (12 DIGITS)</label><input type="number" id="aadhar"></div>
        <div class="field"><label>STUDENT MOBILE (10 DIGITS)</label><input type="number" id="mobile"></div>
        <div class="field"><label>PARENTS MOBILE</label><input type="number" id="pMobile"></div>
        <div class="field"><label>VILLAGE/CITY</label><input type="text" id="village"></div>
        <div class="field"><label>STATE</label><select id="state"><option value="UTTAR PRADESH">UTTAR PRADESH</option><option value="BIHAR">BIHAR</option></select></div>
        <div class="field full"><label>ADDRESS</label><textarea id="address" rows="2"></textarea></div>
        
        <button type="button" class="btn-pay full" onclick="openPayment()">PROCEED TO PAYMENT</button>
    </form>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h2 style="font-weight:800; color:var(--dark);">SECURE PAYMENT</h2>
        <div class="qr-box"><img id="dynamicQR" src="" alt="QR" style="width:100%; height:100%;"></div>
        <p id="qrAmountShow" style="font-size:24px; font-weight:900; color:var(--dark);">₹0</p>
        <div class="bank-details">
            <div class="bank-row"><span class="bank-label">A/C:</span><span class="bank-value">520102120008909</span></div>
            <div class="bank-row"><span class="bank-label">IFSC:</span><span class="bank-value">UBIN0552011</span></div>
            <div class="bank-row"><span class="bank-label">NAME:</span><span class="bank-value">ABHINAY CHAUBEY</span></div>
        </div>
        <input type="text" id="utr" placeholder="MW + 12 DIGIT TRANSACTION ID" style="width:100%; text-align:center; border:2px solid var(--dark); margin-bottom:15px;">
        <button type="button" class="btn-pay" style="background:var(--success);" onclick="verifyAndSubmit()">VERIFY & ENROLL</button>
        <button type="button" onclick="closeModal()" style="margin-top:10px; border:none; background:none; cursor:pointer; color:var(--gray); font-weight:700;">❌ CANCEL</button>
    </div>
</div>

<div class="container" id="successCard">
    <div style="background:var(--success); color:white; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:40px;">✔</div>
    <h1 style="font-weight:900;">ADMISSION CONFIRMED</h1>
    <div id="receiptData"></div>
    <div style="display:flex; gap:15px; margin-top:30px;">
        <button class="btn-pay" onclick="downloadReceipt()" style="background:var(--dark); flex:1;">PRINT A4 RECEIPT</button>
        <button class="btn-pay" onclick="location.reload()" style="background:#e2e8f0; color:var(--dark); flex:1; box-shadow:none;">CLOSE</button>
    </div>
</div>

<script>
    let basePrice = 0, discountAmt = 0, totalGst = 0, finalPayable = 0;

    function updateFee() {
        if(document.getElementById("course").value) {
            basePrice = parseInt(document.getElementById("course").value);
            document.getElementById("feeDisplay").style.display = "block";
            calculateTotal();
        }
    }

    function applyCoupon() {
        let code = document.getElementById("coupon").value.trim().toUpperCase();
        if(code.startsWith("MW")) {
            let num = parseInt(code.replace("MW", ""));
            if(num > 0 && num <= 100) discountAmt = Math.round(basePrice * (num/100));
            else alert("INVALID COUPON!");
        } else if(code === "HBD50") {
            discountAmt = Math.round(basePrice * 0.5);
        } else { alert("INVALID COUPON!"); }
        calculateTotal();
    }

    function calculateTotal() {
        let afterDiscount = basePrice - discountAmt;
        totalGst = Math.round(afterDiscount * 0.05); 
        finalPayable = afterDiscount + totalGst;
        document.getElementById("finalPrice").innerText = "₹" + finalPayable;
        document.getElementById("qrAmountShow").innerText = "₹" + finalPayable;
        let upiUri = `upi://pay?pa=520102120008909@unionbank&pn=ABHINAY%20CHAUBEY&am=${finalPayable}&cu=INR`;
        document.getElementById("dynamicQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUri)}`;
    }

    function openPayment() {
        const fields = ["course", "sName", "fName", "mName", "dob", "aadhar", "mobile", "village", "address"];
        for(let id of fields) { if(!document.getElementById(id).value.trim()){ alert("PLEASE FILL ALL DETAILS!"); return; } }
        
        // Validation for Mobile and Aadhar
        let mobile = document.getElementById("mobile").value;
        let aadhar = document.getElementById("aadhar").value;

        if(mobile.length !== 10) { alert("ERROR: MOBILE NUMBER MUST BE EXACTLY 10 DIGITS!"); return; }
        if(aadhar.length !== 12) { alert("ERROR: AADHAR NUMBER MUST BE EXACTLY 12 DIGITS!"); return; }

        document.getElementById("payModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("payModal").style.display = "none"; }

    function verifyAndSubmit() {
        let utrInput = document.getElementById("utr").value.trim().toUpperCase();
        if(/^MW\d{12}$/.test(utrInput)) {
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("payModal").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            renderReceipt(utrInput);
        } else { alert("ERROR: ENTER 'MW' FOLLOWED BY 12 DIGIT TRANSACTION ID!"); }
    }

    function renderReceipt(utr) {
        let studentID = "MW-" + Math.floor(1000 + Math.random() * 9000) + "-APM";
        let enrollmentNo = "APM" + Date.now().toString().slice(-7);
        let selectedCourse = document.getElementById("course").options[document.getElementById("course").selectedIndex].text;
        
        let html = `
            <div style="width:100%; max-width:800px; margin:20px auto; padding:40px; border:10px double #0f172a; background:#fff; text-align:left; position:relative; box-sizing:border-box;">
                <div style="position:absolute; top:40px; right:40px; border:4px solid #10b981; color:#10b981; padding:10px 20px; transform:rotate(15deg); font-weight:900; font-size:18px; border-radius:10px; opacity:0.9;">PAYMENT VERIFIED</div>
                
                <div style="text-align:center; border-bottom:4px solid #d32f2f; padding-bottom:15px; margin-bottom:25px;">
                    <h1 style="margin:0; font-size:32px; color:#0f172a;">AP MATHEMATICS</h1>
                    <p style="font-size:12px; font-weight:800; color:#d32f2f; margin-top:5px;">POWERED BY ABHINAY PRATAP MATHS (MATHS MYSTIC)</p>
                    <p style="font-size:10px; color:#64748b;">OFFICIAL ADMISSION RECEIPT - SESSION 2026-27</p>
                </div>

                <div style="display:flex; justify-content:space-between; background:#f8fafc; padding:20px; border-radius:15px; margin-bottom:30px; border:1px solid #e2e8f0;">
                    <div><p style="font-size:10px; color:#64748b;">STUDENT ID</p><p style="font-weight:900; font-size:16px; color:#d32f2f;">${studentID}</p></div>
                    <div style="text-align:right;"><p style="font-size:10px; color:#64748b;">ENROLLMENT NO</p><p style="font-weight:900; font-size:16px;">${enrollmentNo}</p></div>
                </div>

                <table style="width:100%; font-size:14px; line-height:2.5; border-collapse:collapse;">
                    <tr><td style="color:#64748b;">FULL NAME:</td><td align="right"><b>${document.getElementById("sName").value}</b></td></tr>
                    <tr><td style="color:#64748b;">FATHER'S NAME:</td><td align="right">${document.getElementById("fName").value}</td></tr>
                    <tr><td style="color:#64748b;">AADHAR NO:</td><td align="right">${document.getElementById("aadhar").value}</td></tr>
                    <tr><td style="color:#64748b;">MOBILE NO:</td><td align="right">${document.getElementById("mobile").value}</td></tr>
                    <tr><td style="color:#64748b;">COURSE ENROLLED:</td><td align="right"><b>${selectedCourse}</b></td></tr>
                    <tr style="border-top:1px solid #eee;"><td>BATCH BASE PRICE:</td><td align="right">₹${basePrice}</td></tr>
                    <tr><td>DISCOUNT:</td><td align="right" style="color:red;">-₹${discountAmt}</td></tr>
                    <tr style="background:#0f172a; color:#fff; font-size:18px; font-weight:900;">
                        <td style="padding:12px; border-radius:10px 0 0 10px;">TOTAL AMOUNT PAID:</td>
                        <td align="right" style="padding:12px; border-radius:0 10px 10px 0;">₹${finalPayable}</td>
                    </tr>
                    <tr><td style="color:#10b981; font-weight:bold;">TRANSACTION ID:</td><td align="right" style="color:#10b981; font-weight:bold;">${utr}</td></tr>
                </table>

                <div style="margin-top:80px; display:flex; justify-content:space-between;">
                    <div style="text-align:center;">
                        <p style="font-weight:900; color:#0f172a; font-size:14px; border-bottom:2px solid #0f172a; display:inline-block; padding:0 20px;">Bholu Chaubey</p>
                        <p style="font-size:11px; margin-top:5px; font-weight:800;">BHOLU CHAUBEY</p>
                        <p style="font-size:9px; color:#64748b;">DIRECTOR</p>
                    </div>
                    <div style="text-align:center;">
                        <p style="font-weight:900; color:#d32f2f; font-size:14px; border-bottom:2px solid #d32f2f; display:inline-block; padding:0 20px;">Abhinay Pratap</p>
                        <p style="font-size:11px; margin-top:5px; font-weight:800;">ABHINAY PRATAP</p>
                        <p style="font-size:9px; color:#64748b;">FOUNDER (MATHS MYSTIC)</p>
                    </div>
                </div>
                <div style="text-align:center; margin-top:40px; font-size:10px; color:#94a3b8; border-top:1px dashed #eee; padding-top:15px;">
                    © AP MATHEMATICS 2026 | WWW.APMATHS.ONLINE | HELP: +91 9670078465
                </div>
            </div>
        `;
        document.getElementById("receiptData").innerHTML = html;
    }

    function downloadReceipt() {
        const content = document.getElementById("receiptData").innerHTML;
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>Print Receipt</title>
                    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; margin:0; }
                        @page { size: A4; margin: 0; }
                        @media print { .no-print { display: none; } }
                    </style>
                </head>
                <body onload="window.print()">
                    ${content}
                </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>

</body>
</html>
