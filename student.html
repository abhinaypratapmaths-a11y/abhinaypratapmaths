<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM ADMISSION PORTAL | AP MATHEMATICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --success: #10b981; --gray: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        
        body { 
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e0 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }

        .container { 
            background: white; width: 100%; max-width: 900px; 
            border-radius: 25px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.2); 
            border: 2px solid var(--primary); overflow: hidden; 
        }

        /* Messenger Alert */
        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 15px; padding: 12px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 2000;
            align-items: center; gap: 15px; border-bottom: 5px solid #d32f2f;
            animation: slideIn 0.4s ease; min-width: 320px;
        }
        #customAlert img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #d32f2f; object-fit: cover; }
        #customAlert span { font-weight: 800; font-size: 13px; color: var(--primary); }

        @keyframes slideIn { from { top: -100px; } to { top: 20px; } }

        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--accent); }
        .header-imgs { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .header-imgs img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 35px; }
        .full { grid-column: span 2; }
        .field label { font-size: 10px; font-weight: 800; color: #475569; margin-bottom: 6px; display: block; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 13px; font-weight: 700; }

        .fee-status { background: #fef2f2; padding: 15px 25px; border-radius: 15px; border: 1.5px solid #fee2e2; margin-top: 10px; }
        .btn-pay { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.4s; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 100; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: white; padding: 30px; border-radius: 35px; max-width: 450px; width: 100%; text-align: center; border: 2px solid var(--accent); }

        .bank-box { background: #0f172a; color: white; padding: 15px; border-radius: 15px; text-align: left; margin: 15px 0; border-left: 5px solid var(--accent); }

        #successCard { display: none; padding: 40px; text-align: center; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div id="customAlert">
    <img src="abhi.png" alt="ABHINAY PRATAP">
    <span id="alertMsg"></span>
</div>

<div class="container" id="mainContainer">
    <div class="header">
        <div class="header-imgs">
            <img src="logo.png" alt="User Photo">
            <img src="abhi.png" alt="Logo">
        </div>
        <h1>EXAMEDGE ONLINE</h1>
        <p> BY ABHINAYPRATAP CHAUBEY</p>
    </div>

    <form id="admissionForm" class="form-grid">
        <div class="field full">
            <label>SELECT BATCH <span>*</span></label>
            <select id="course" onchange="updateFee()">
                <option value="">-- CHOOSE YOUR BATCH --</option>
                <option value="500">REGISTRATION FEE</option>
                <option value="2199">LAKSHYA FOUNDATION BATCH</option>
                <option value="999">ENTRENCE EXAM FOUNDATION</option>
                <option value="2199">SANKALP FOUNDATION BATCH</option>
                <option value="3000" data-type="special">MATHS SPECIAL 2026</option>
            </select>
        </div>

        <div class="field full">
            <label>COUPON CODE</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="coupon" placeholder="ENTER CODE">
                <button type="button" onclick="applyCoupon()" style="padding:0 25px; background:var(--primary); color:white; border-radius:12px; border:none; cursor:pointer; font-weight:800;">APPLY</button>
            </div>
        </div>

        <div class="field full fee-status" id="feeDisplay" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:900; color:var(--primary);">TOTAL PAYABLE (INCL. GST):</span>
                <span id="finalPrice" style="font-size:22px; font-weight:900; color:#d32f2f;">₹0</span>
            </div>
        </div>

        <div class="field"><label>STUDENT NAME</label><input type="text" id="sName"></div>
        <div class="field"><label>FATHER'S NAME</label><input type="text" id="fName"></div>
        <div class="field"><label>DATE OF BIRTH</label><input type="date" id="dob"></div>
        <div class="field"><label>AADHAR (12 DIGITS)</label><input type="number" id="aadhar" oninput="if(this.value.length > 12) this.value = this.value.slice(0,12);"></div>
        <div class="field"><label>MOBILE (10 DIGITS)</label><input type="number" id="mobile" oninput="if(this.value.length > 10) this.value = this.value.slice(0,10);"></div>
        <div class="field full"><label>ADDRESS</label><textarea id="address" rows="2"></textarea></div>
        
        <button type="button" class="btn-pay full" onclick="openPayment()">PROCEED TO SECURE PAYMENT</button>
    </form>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h2 style="font-weight:900; color:var(--primary);">SCAN & PAY</h2>
        <div style="width:180px; height:180px; margin:15px auto; border:3px solid var(--primary); padding:5px; border-radius:15px;">
            <img id="dynamicQR" src="" alt="QR" style="width:100%; height:100%;">
        </div>
        <div class="bank-box">
            <p style="font-size:14px; font-weight:900; color:var(--accent);">520102120008909</p>
            <p style="font-size:11px; margin-top:5px; font-weight:700;">IFSC: UBIN0552011 | ABHINAY CHAUBEY</p>
        </div>
        <input type="text" id="utr" placeholder="PLEASE ENTER UTR NUMBER AND COMPLETE YOUR ADDMISSION" style="width:100%; text-align:center; border:2px solid var(--primary); margin-bottom:15px; border-radius:12px; padding:15px;">
        <button type="button" class="btn-pay" style="background:var(--success);" onclick="verifyAndSubmit()">VERIFY & ENROLL</button>
    </div>
</div>

<div class="container" id="successCard">
    <h1 style="font-size:28px; font-weight:900; color:var(--primary); margin-bottom: 10px;">✅ ADDMISSION SUCCESSFUL!</h1>
    <div id="receiptData"></div>
    <button class="btn-pay" onclick="downloadReceipt()" style="margin-top:30px; background:var(--primary); max-width:400px;">DOWNLOAD OFFICIAL RECEIPT</button>
</div>

<script>
    let basePrice = 0, discountAmt = 0, finalPayable = 0, gstAmt = 0;

    function showAlert(msg) {
        const box = document.getElementById("customAlert");
        document.getElementById("alertMsg").innerText = msg;
        box.style.display = "flex";
        setTimeout(() => { box.style.display = "none"; }, 4000);
    }

    function updateFee() {
        if(document.getElementById("course").value) {
            basePrice = parseInt(document.getElementById("course").value);
            document.getElementById("feeDisplay").style.display = "block";
            calculateTotal();
        }
    }

    function applyCoupon() {
        let code = document.getElementById("coupon").value.trim().toUpperCase();
        if(code.startsWith("MW")) {
            let num = parseInt(code.replace("MW", ""));
            if(num > 0 && num <= 90) discountAmt = Math.round(basePrice * (num/100));
        } else if(code === "HBD50") {
            discountAmt = Math.round(basePrice * 0.5);
        } else { showAlert("❌❌INVALID COUPON!"); }
        calculateTotal();
    }

    function calculateTotal() {
        let afterDisc = basePrice - discountAmt;
        gstAmt = Math.round(afterDisc * 0.05);
        finalPayable = afterDisc + gstAmt;
        document.getElementById("finalPrice").innerText = "₹" + finalPayable;
        let upi = `upi://pay?pa=7705042892@axl=ABHINAY%20CHAUBEY&am=${finalPayable}&cu=INR`;
        document.getElementById("dynamicQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upi)}`;
    }

    function openPayment() {
        const fields = ["course", "sName", "fName", "dob", "aadhar", "mobile", "address"];
        for(let id of fields) { if(!document.getElementById(id).value.trim()){ showAlert("FILL ALL DETAILS!"); return; } }
        if(document.getElementById("mobile").value.length !== 10) return showAlert("MOBILE MUST BE 10 DIGITS!");
        if(document.getElementById("aadhar").value.length !== 12) return showAlert("AADHAR MUST BE 12 DIGITS!");
        document.getElementById("payModal").style.display = "flex";
    }

    function verifyAndSubmit() {
        let utr = document.getElementById("utr").value.trim().toUpperCase();
        if(/^MW\d{12}$/.test(utr)) {
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("payModal").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            renderReceipt(utr);
        } else showAlert("ENTER PAYMENT UTR NUMBER !");
    }

    function renderReceipt(utr) {
        let studentID = "APM-" + Math.floor(1000 + Math.random() * 9000);
        let enrollment = "ENR" + Date.now().toString().slice(-6);
        let course = document.getElementById("course").options[document.getElementById("course").selectedIndex].text;
        const now = new Date();
        const dateTime = now.toLocaleDateString('en-GB') + " | " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

        document.getElementById("receiptData").innerHTML = `
            <div id="printArea" style="width:100%; max-width:800px; margin:0 auto; padding:40px; border:15px double var(--primary); background:#fff; text-align:left; box-sizing:border-box;">
                <div style="text-align:center; margin-bottom:30px;">
                    <h1 style="margin:0; font-size:32px; color:var(--primary);">EXAMEDGE ONLINE</h1>
                    <p style="font-size:12px; font-weight:800; color:var(--accent);">BY ABHINAY </p>
                    <p style="font-size:10px; color:#64748b; margin-top:5px;">${dateTime}</p>
                </div>

                <div style="display:flex; flex-direction:column; align-items:flex-end; margin-bottom:30px; font-size:14px; line-height:1.6;">
                    <div style="font-weight:600;"><b>STUDENT ID:</b> <span style="color:#d32f2f;">${studentID}</span></div>
                    <div style="font-weight:600;"><b>ENROLLMENT:</b> <span>${enrollment}</span></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; font-size: 14px;">
                    <div><b>STUDENT NAME:</b><br>${document.getElementById("sName").value}</div>
                    <div><b>FATHER'S NAME:</b><br>${document.getElementById("fName").value}</div>
                    <div><b>DATE OF BIRTH:</b><br>${document.getElementById("dob").value}</div>
                    <div><b>MOBILE NO:</b><br>${document.getElementById("mobile").value}</div>
                    <div><b>AADHAR NO:</b><br>${document.getElementById("aadhar").value}</div>
                    <div style="grid-column: span 2;"><b>COURSE NAME:</b><br><b>${course}</b></div>
                </div>

                <div style="border:1px solid #e2e8f0; border-radius:15px; padding:25px; background:#f8fafc; margin-bottom: 20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>COURSE PRICE:</span> <span>₹${basePrice}</span></div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#d32f2f;"><span>DISCOUNT:</span> <span>-₹${discountAmt}</span></div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>GST (5%):</span> <span>₹${gstAmt}</span></div>
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900; border-top:2px solid #e2e8f0; padding-top:15px; color:var(--primary);">
                        <span>TOTAL PAID AMOUNT:</span> <span>₹${finalPayable}</span>
                    </div>
                </div>

                <p style="font-size:13px; margin-bottom:60px;"><b>UTR ID:</b> <span style="color:var(--success); font-weight:900;">${utr}</span></p>

                <div style="display:flex; justify-content:space-between; align-items: flex-end;">
                    <div style="text-align:center; width:40%;">
                        <div style="border-bottom: 3px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-weight: 900; font-size: 16px;">BHOLU CHAUBEY</div>
                        <p style="font-size:11px; font-weight:700;">BHOLU CHAUBEY<br>(DIRECTOR)</p>
                    </div>
                    <div style="text-align:center; width:40%;">
                        <div style="border-bottom: 3px solid #d32f2f; margin-bottom: 10px; padding-bottom: 5px; font-weight: 900; font-size: 16px; color: #d32f2f;">ABHINAY PRATAP</div>
                        <p style="font-size:11px; font-weight:700;">ABHINAY PRATAP<br>(FOUNDER)</p>
                    </div>
                </div>

                <div style="margin-top:50px; text-align:center; font-size:10px; color:#94a3b8; border-top:1px dashed #eee; padding-top:20px;">
                    CONTACT: +91 9670078465 | WEBSITE: WWW.EXAMEDGE.ONLINE || YOUTUBE: @abhinaypratapmaths <br>
                    THIS IS A COMPUTER GENERATED SECURE RECEIPT. NO PHYSICAL SIGNATURE REQUIRED.
                </div>
            </div>`;
    }

    function downloadReceipt() {
        const content = document.getElementById("receiptData").innerHTML;
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>
            *{text-transform:uppercase; font-family:sans-serif;} 
            @page {size: A4; margin: 0;} 
            body{margin:0; background:#fff; padding:20px;}
            #printArea {box-shadow: none !important; border: 15px double #0f172a !important;}
        </style></head><body onload="window.print()">${content}</body></html>`);
        win.document.close();
    }
</script>
</body>
</html>
