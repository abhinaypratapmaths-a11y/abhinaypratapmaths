<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM ADMISSION | AP MATHEMATICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #ff3333; 
            --dark: #0f172a; 
            --success: #00c853; 
            --gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        
        body { 
            background: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }

        .container { 
            background: white; width: 100%; max-width: 900px; 
            border-radius: 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.15); 
            border: 1px solid #e2e8f0; overflow: hidden; position: relative;
        }

        /* Animated Header */
        .header { 
            background: var(--gradient); color: white; padding: 60px 20px; 
            text-align: center; position: relative;
        }

        .header img { 
            width: 120px; height: 120px; margin-bottom: 20px; 
            border-radius: 50%; border: 6px solid var(--primary); 
            box-shadow: 0 15px 30px rgba(255,51,51,0.3); object-fit: cover; 
            background: white;
        }

        .header h1 { font-size: 36px; letter-spacing: 4px; font-weight: 800; margin-bottom: 5px; }
        .header p { font-size: 14px; color: #94a3b8; letter-spacing: 3px; font-weight: 600; }

        /* Form Styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 50px; }
        .full { grid-column: span 2; }

        .field { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; display: flex; align-items: center; gap: 8px; }
        label i { color: var(--primary); font-size: 14px; }

        input, select, textarea { 
            padding: 18px; border-radius: 20px; border: 2px solid #f1f5f9; 
            background: #f8fafc; font-size: 14px; font-weight: 600; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--dark);
        }

        input:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Discount Section */
        .coupon-box { display: flex; gap: 10px; background: #f1f5f9; padding: 8px; border-radius: 25px; border: 2px dashed #cbd5e1; }
        .coupon-box input { border: none; background: transparent; padding: 10px 20px; flex: 1; }
        .btn-apply { background: var(--dark); color: white; border: none; padding: 0 30px; border-radius: 18px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .btn-apply:hover { background: var(--primary); }

        .fee-card { 
            background: #fff5f5; padding: 25px; border-radius: 25px; 
            border: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center;
        }

        /* Buttons */
        .btn-pay { 
            width: 100%; padding: 25px; background: var(--primary); color: white; 
            border: none; border-radius: 25px; font-size: 18px; font-weight: 800; 
            cursor: pointer; transition: 0.4s; box-shadow: 0 20px 40px rgba(255, 51, 51, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .btn-pay:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(255, 51, 51, 0.4); }

        /* Modal */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); 
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); 
        }

        .modal-content { 
            background: white; padding: 50px; border-radius: 40px; 
            max-width: 450px; width: 90%; text-align: center;
        }

        .qr-frame { 
            width: 250px; height: 250px; margin: 30px auto; padding: 20px;
            border: 2px solid #e2e8f0; border-radius: 30px; position: relative;
        }

        /* Receipt Success */
        #successCard { display: none; padding: 50px; }
        
        @media (max-width: 650px) { .form-grid { grid-template-columns: 1fr; padding: 30px 20px; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <img src="alogo.png" alt="APM LOGO"> 
        <h1>AP MATHEMATICS</h1>
        <p><i class="fas fa-award"></i> BY ABHINAY PRATAP SIR</p>
    </div>

    <form id="admissionForm" class="form-grid">
        <div class="field full">
            <label><i class="fas fa-graduation-cap"></i> SELECT LIVE BATCH 2026</label>
            <select id="course" onchange="updateFee()">
                <option value="">-- CLICK TO CHOOSE --</option>
                <option value="500">REGISTRATION FEE (ALL EXAMS)</option>
                <option value="2199">LAKSHYA FOUNDATION 2.0</option>
                <option value="2199">SANKALP FOUNDATION 2.0</option>
                <option value="3000" data-type="special">MATHS SPECIAL (PRE + MAINS)</option>
            </select>
        </div>
        
        <div class="field full">
            <label><i class="fas fa-tags"></i> HAVE A DISCOUNT COUPON?</label>
            <div class="coupon-box">
                <input type="text" id="coupon" placeholder="ENTER CODE HERE">
                <button type="button" class="btn-apply" onclick="applyCoupon()">APPLY</button>
            </div>
        </div>

        <div class="field full fee-card" id="feeDisplay" style="display:none">
            <span style="font-weight:800; color:var(--dark);">FINAL PAYABLE AMOUNT</span>
            <span id="finalPrice" style="font-size:32px; font-weight:900; color:var(--primary);">₹0</span>
        </div>

        <div class="field"><label><i class="fas fa-user"></i> STUDENT NAME</label><input type="text" id="sName" placeholder="AS PER AADHAR"></div>
        <div class="field"><label><i class="fas fa-user-friends"></i> FATHER'S NAME</label><input type="text" id="fName"></div>
        <div class="field"><label><i class="fas fa-phone-alt"></i> MOBILE NO.</label><input type="number" id="mobile"></div>
        <div class="field"><label><i class="fas fa-envelope"></i> EMAIL ID</label><input type="email" id="email"></div>
        <div class="field"><label><i class="fas fa-id-card"></i> AADHAR NUMBER</label><input type="number" id="aadhar"></div>
        <div class="field"><label><i class="fas fa-calendar-alt"></i> DATE OF BIRTH</label><input type="date" id="dob"></div>
        <div class="field full"><label><i class="fas fa-map-marker-alt"></i> FULL ADDRESS</label><textarea id="address" rows="2"></textarea></div>
        
        <button type="button" class="btn-pay full" onclick="openPayment()">
            <i class="fas fa-lock"></i> PROCEED TO PAYMENT
        </button>
    </form>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h2 style="font-weight:800;"><i class="fas fa-qrcode"></i> UPI PAYMENT</h2>
        <div class="qr-frame"><img id="dynamicQR" src="" style="width:100%;"></div>
        <p id="qrAmountShow" style="font-size:35px; font-weight:900; color:var(--primary);">₹0</p>
        <p style="font-size:12px; margin:15px 0; color:#64748b;">PAY VIA ANY UPI APP AND ENTER UTR NO.</p>
        <input type="text" id="utr" placeholder="12 DIGIT UTR NUMBER" style="width:100%; text-align:center; border:2px solid var(--dark); margin-bottom:15px;">
        <button type="button" class="btn-pay" style="background:var(--success);" onclick="verifyAndSubmit()">
            <i class="fas fa-check-circle"></i> VERIFY & ENROLL
        </button>
        <button type="button" onclick="closeModal()" style="margin-top:20px; border:none; background:none; cursor:pointer; color:#94a3b8; font-weight:bold;">CANCEL</button>
    </div>
</div>

<div class="container" id="successCard">
    <div style="text-align:center;">
        <div style="font-size:80px; color:var(--success); margin-bottom:20px;"><i class="fas fa-circle-check"></i></div>
        <h1 style="font-weight:900;">ADMISSION SECURED!</h1>
        <p style="color:#64748b; margin-top:10px;">YOUR REGISTRATION IS SUCCESSFULLY COMPLETED</p>
    </div>
    <div id="receiptData"></div>
    <div style="display:flex; gap:15px; margin-top:30px; padding:0 50px 50px;">
        <button class="btn-pay" onclick="downloadReceipt()" style="background:var(--dark); flex:1;"><i class="fas fa-download"></i> RECEIPT</button>
        <button class="btn-pay" onclick="location.reload()" style="background:#e2e8f0; color:var(--dark); flex:1; box-shadow:none;">CLOSE</button>
    </div>
</div>

<script>
    let basePrice = 0, discountAmt = 0;

    function updateFee() {
        if(document.getElementById("course").value) {
            basePrice = parseInt(document.getElementById("course").value);
            document.getElementById("feeDisplay").style.display = "flex";
            calculateTotal();
        }
    }

    function applyCoupon() {
        let code = document.getElementById("coupon").value.trim().toUpperCase();
        let courseSelect = document.getElementById("course");
        let isSpecial = courseSelect.options[courseSelect.selectedIndex].getAttribute('data-type') === 'special';
        
        if(code === "HBD50" && isSpecial) {
            discountAmt = Math.round(basePrice * 0.5);
            alert("CONGRATS! 50% DISCOUNT APPLIED.");
        } else if(code.startsWith("MW")) {
            let num = parseInt(code.replace("MW", ""));
            if(num > 0 && num <= 100) discountAmt = Math.round(basePrice * (num/100));
        } else { alert("INVALID COUPON!"); discountAmt = 0; }
        calculateTotal();
    }

    function calculateTotal() {
        let final = basePrice - discountAmt;
        document.getElementById("finalPrice").innerText = "₹" + final;
        document.getElementById("dynamicQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('upi://pay?pa=7705042892@axl&pn=AP%20MATHEMATICS&am='+final+'&cu=INR')}`;
        document.getElementById("qrAmountShow").innerText = "₹" + final;
    }

    function openPayment() {
        const fields = ["course", "sName", "mobile", "aadhar"];
        for(let id of fields) { if(!document.getElementById(id).value.trim()){ alert("PLEASE FILL MANDATORY FIELDS!"); return; } }
        document.getElementById("payModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("payModal").style.display = "none"; }

    function verifyAndSubmit() {
        let utr = document.getElementById("utr").value.trim();
        if(utr.length >= 10) {
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("payModal").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            renderReceipt(utr);
        } else alert("INVALID UTR NUMBER!");
    }

    function renderReceipt(utr) {
        let studentID = "APM-" + Math.floor(Math.random() * 90000 + 10000);
        let courseName = document.getElementById("course").options[document.getElementById("course").selectedIndex].text;
        
        let html = `
            <div style="margin:30px auto; padding:40px; border:2px solid #000; background:#fff; position:relative; max-width:600px;">
                <div style="text-align:center; border-bottom:3px solid var(--primary); padding-bottom:15px;">
                    <h2 style="margin:0;">AP MATHEMATICS</h2>
                    <p style="font-size:10px; color:var(--primary); font-weight:bold;">POWERED BY ABHINAY PRATAP MATHS</p>
                </div>
                <div style="margin:20px 0; font-size:12px; line-height:2;">
                    <p><b>STUDENT ID:</b> ${studentID}</p>
                    <p><b>BATCH:</b> ${courseName}</p>
                    <p><b>NAME:</b> ${document.getElementById("sName").value}</p>
                    <p><b>MOBILE:</b> ${document.getElementById("mobile").value}</p>
                    <p><b>UTR NO:</b> ${utr}</p>
                    <hr style="margin:15px 0; border:1px dashed #ddd;">
                    <p style="font-size:18px; color:var(--success);"><b>PAID AMOUNT: ₹${basePrice - discountAmt}</b></p>
                </div>
                <div style="text-align:right; margin-top:30px;">
                    <p style="font-size:12px; font-weight:bold;">DIRECTOR SIGNATURE</p>
                    <p style="font-size:10px; color:#64748b;">(COMPUTER GENERATED)</p>
                </div>
            </div>
        `;
        document.getElementById("receiptData").innerHTML = html;
    }

    function downloadReceipt() {
        const content = document.getElementById("receiptData").innerHTML;
        const blob = new Blob([`<html><body style="padding:20px;">${content}</body></html>`], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "AP_MATHS_RECEIPT.html";
        link.click();
    }
</script>

</body>
</html>
