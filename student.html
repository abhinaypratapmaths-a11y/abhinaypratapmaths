<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATHEMATICS | PREMIUM ADMISSION 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #e11d48; 
            --primary-dark: #be123c;
            --dark: #0f172a; 
            --accent: #f43f5e;
            --success: #10b981; 
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        
        body { 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: var(--glass); width: 100%; max-width: 900px; 
            border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); overflow: hidden; 
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header { 
            background: var(--dark); color: white; padding: 50px 20px; 
            text-align: center; position: relative; overflow: hidden;
        }

        .header::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), #fbbf24, var(--primary));
        }

        .header img { 
            width: 110px; height: 110px; margin-bottom: 15px; 
            border-radius: 50%; border: 5px solid var(--primary); 
            box-shadow: 0 0 30px rgba(225, 29, 72, 0.4); object-fit: cover; 
            transition: transform 0.5s;
        }
        .header img:hover { transform: rotate(360deg) scale(1.1); }

        .header h1 { font-size: 38px; letter-spacing: 3px; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 10px; letter-spacing: 2px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 50px; }
        .full { grid-column: span 2; }

        .field { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 12px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 5px; }
        label span { color: var(--primary); }

        input, select, textarea { 
            padding: 18px; border-radius: 16px; border: 2px solid #e2e8f0; 
            background: #f8fafc; font-size: 14px; font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--dark);
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 0 0 5px rgba(225, 29, 72, 0.1); transform: translateY(-2px); }

        .fee-status { 
            background: #fff1f2; padding: 30px; border-radius: 24px; 
            border: 2px solid var(--primary); margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.2); } 70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }

        .btn-pay { 
            width: 100%; padding: 22px; background: linear-gradient(45deg, var(--dark), #1e293b); color: white; 
            border: none; border-radius: 20px; font-size: 18px; font-weight: 800; 
            cursor: pointer; transition: 0.4s; box-shadow: 0 15px 35px rgba(15, 23, 42, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-pay:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.4); background: var(--primary); }

        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: white; padding: 50px; border-radius: 40px; 
            max-width: 500px; width: 100%; text-align: center; border: 4px solid var(--primary);
        }

        .qr-box { 
            width: 260px; height: 260px; background: white; margin: 30px auto; 
            border-radius: 25px; border: 2px solid #e2e8f0; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #successCard { display: none; padding: 60px 40px; text-align: center; }

        .receipt-container { border-radius: 20px; overflow: hidden; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; padding: 30px; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <img src="alogo.png" id="mainLogo" alt="LOGO"> 
        <h1>AP MATHEMATICS</h1>
        <p>— THE ULTIMATE LEARNING HUB —</p>
    </div>
    <form id="admissionForm" class="form-grid">
        <div class="field full">
            <label>⚡ SELECT YOUR DREAM BATCH <span>*</span></label>
            <select id="course" onchange="updateFee()">
                <option value="">-- CHOOSE COURSE --</option>
                <option value="500">ADMISSION REGISTRATION </option>
                <option value="2199">LAKSHYA FOUNDATION BATCH </option>
                <option value="2199">SANKALP FOUNDATION BATCH </option>
                <option value="3000" data-type="special">MATHS SPECIAL 2026 (PRE+MAINS) </option>
            </select>
        </div>
        
        <div class="field full">
            <label>🏷️ COUPON CODE</label>
            <div style="display:flex; gap:15px;">
                <input type="text" id="coupon" placeholder="ENTER CODE (e.g. MW20)" style="flex:1;">
                <button type="button" onclick="applyCoupon()" style="padding:0 35px; background:var(--dark); color:white; border-radius:18px; border:none; cursor:pointer; font-weight:800; transition:0.3s;">APPLY</button>
            </div>
        </div>

        <div class="field full fee-status" id="feeDisplay" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; color:#1e293b; font-size:14px;">TOTAL PAYABLE AMOUNT:</span>
                <span id="finalPrice" style="font-size:32px; font-weight:900; color:var(--primary);">₹0</span>
            </div>
        </div>

        <div class="field"><label>👤 STUDENT NAME</label><input type="text" id="sName" placeholder="AS PER AADHAR"></div>
        <div class="field"><label>👨‍👩‍👦 FATHER'S NAME</label><input type="text" id="fName"></div>
        <div class="field"><label>📱 STUDENT MOBILE</label><input type="number" id="mobile" placeholder="10 DIGIT NUMBER"></div>
        <div class="field"><label>📅 DATE OF BIRTH</label><input type="date" id="dob"></div>
        <div class="field"><label>🆔 AADHAR NO.</label><input type="number" id="aadhar" placeholder="XXXX XXXX XXXX"></div>
        <div class="field"><label>📧 EMAIL ID</label><input type="email" id="email" placeholder="EXAMPLE@GMAIL.COM"></div>
        <div class="field"><label>📍 VILLAGE/CITY</label><input type="text" id="village"></div>
        <div class="field"><label>🏛️ STATE</label><select id="state"><option value="UTTAR PRADESH">UTTAR PRADESH</option><option value="BIHAR">BIHAR</option><option value="OTHER">OTHER</option></select></div>
        <div class="field full"><label>🏠 PERMANENT ADDRESS</label><textarea id="address" rows="2" placeholder="COMPLETE ADDRESS WITH PINCODE"></textarea></div>
        
        <button type="button" class="btn-pay full" onclick="openPayment()">PROCEED TO SECURE CHECKOUT</button>
    </form>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h2 style="font-weight:900; color:var(--dark); font-size:24px;">SCAN & PAY SECURELY</h2>
        <div class="qr-box"><img id="dynamicQR" src="" alt="QR" style="width:100%; height:100%;"></div>
        <p id="qrAmountShow" style="font-weight:900; color:var(--primary); font-size:35px; margin-bottom:10px;">₹0</p>
        <div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:20px;">
            <p style="font-size:12px; color:#475569; font-weight:700;">TRANSACTION UTR NO. (REQUIRED)</p>
            <input type="text" id="utr" placeholder="ENTER 12-DIGIT UTR" style="width:100%; text-align:center; border:2px solid var(--dark); margin-top:10px; background:white;">
        </div>
        <button type="button" class="btn-pay" style="background:var(--success); box-shadow: 0 10px 20px rgba(16,185,129,0.3);" onclick="verifyAndSubmit()">CONFIRM PAYMENT & ENROLL</button>
        <button type="button" onclick="closeModal()" style="margin-top:20px; border:none; background:none; cursor:pointer; color:#64748b; font-weight:800; font-size:12px;">GO BACK</button>
    </div>
</div>

<div class="container" id="successCard">
    <div style="background:var(--success); width:90px; height:90px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 30px; box-shadow: 0 10px 30px rgba(16,185,129,0.4);">
        <span style="color:white; font-size:45px;">✔</span>
    </div>
    <h2 style="font-weight:900; font-size:30px; color:var(--dark);">ADMISSION CONFIRMED!</h2>
    <p style="color:#64748b; margin-top:10px; font-weight:600;">WELCOME TO THE FAMILY OF AP MATHEMATICS</p>
    
    <div id="receiptData" class="receipt-container"></div>
    
    <div style="display:flex; gap:20px; margin-top:40px;">
        <button class="btn-pay" onclick="downloadReceipt()" style="background:var(--dark); flex:1;">📥 DOWNLOAD RECEIPT</button>
        <button class="btn-pay" onclick="location.reload()" style="background:#e2e8f0; color:#1e293b; flex:1; box-shadow:none;">DONE</button>
    </div>
</div>

<script>
    let basePrice = 0, discountAmt = 0;

    function updateFee() {
        const course = document.getElementById("course");
        if(course.value) {
            basePrice = parseInt(course.value);
            document.getElementById("feeDisplay").style.display = "block";
            calculateTotal();
        }
    }

    function applyCoupon() {
        let code = document.getElementById("coupon").value.trim().toUpperCase();
        let courseSelect = document.getElementById("course");
        let isSpecial = courseSelect.options[courseSelect.selectedIndex].getAttribute('data-type') === 'special';
        
        if(code === "HBD50" && isSpecial) {
            discountAmt = Math.round(basePrice * 0.5);
            alert("50% DISCOUNT APPLIED!");
        } else if(code.startsWith("MW")) {
            let num = parseInt(code.replace("MW", ""));
            if(num > 0 && num <= 100) {
                discountAmt = Math.round(basePrice * (num/100));
                alert(num + "% DISCOUNT APPLIED!");
            }
        } else { alert("INVALID OR EXPIRED COUPON!"); discountAmt = 0; }
        calculateTotal();
    }

    function calculateTotal() {
        let final = basePrice - discountAmt;
        document.getElementById("finalPrice").innerText = "₹" + final;
        document.getElementById("dynamicQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('upi://pay?pa=7705042892@axl&pn=AP%20MATHEMATICS&am='+final+'&cu=INR')}`;
        document.getElementById("qrAmountShow").innerText = "₹" + final;
    }

    function openPayment() {
        const fields = ["course", "sName", "fName", "dob", "aadhar", "mobile", "email", "village", "address"];
        for(let id of fields) { if(!document.getElementById(id).value.trim()){ alert("PLEASE COMPLETE ALL REQUIRED FIELDS!"); return; } }
        document.getElementById("payModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("payModal").style.display = "none"; }

    function verifyAndSubmit() {
        let utr = document.getElementById("utr").value.trim().toUpperCase();
        if(utr.length >= 10) { // Demo verification
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("payModal").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            renderReceipt(utr);
        } else alert("ENTER A VALID 12-DIGIT UTR NUMBER!");
    }

    function renderReceipt(utr) {
        let studentID = "APM-" + Math.floor(100000 + Math.random() * 900000);
        let courseName = document.getElementById("course").options[document.getElementById("course").selectedIndex].text;
        let time = new Date().toLocaleString();

        let html = `
            <div style="padding:40px; background:#fff; position:relative; border:2px solid #e2e8f0; text-align:left;">
                <div style="position:absolute; top:20%; left:10%; opacity:0.05; transform:rotate(-30deg); font-size:80px; font-weight:900; pointer-events:none;">AP MATHEMATICS</div>
                
                <div style="display:flex; justify-content:space-between; border-bottom:4px solid var(--primary); padding-bottom:20px;">
                    <div>
                        <h1 style="color:var(--dark); font-size:28px; margin:0;">AP MATHEMATICS</h1>
                        <p style="color:var(--primary); font-weight:800; font-size:12px;">PREMIUM EDUCATION PORTAL</p>
                    </div>
                    <div style="text-align:right; font-size:10px; color:#64748b;">
                        <p>RECEIPT NO: ${Date.now().toString().slice(-8)}</p>
                        <p>DATE: ${time}</p>
                    </div>
                </div>

                <div style="margin:25px 0; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div style="background:#f8fafc; padding:15px; border-radius:12px;">
                        <p style="font-size:10px; color:#64748b;">STUDENT ID</p>
                        <p style="font-weight:800; color:var(--dark);">${studentID}</p>
                    </div>
                    <div style="background:#f8fafc; padding:15px; border-radius:12px;">
                        <p style="font-size:10px; color:#64748b;">COURSE ENROLLED</p>
                        <p style="font-weight:800; color:var(--dark);">${courseName}</p>
                    </div>
                </div>

                <table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px 0; color:#64748b;">STUDENT NAME</td><td align="right" style="font-weight:700;">${document.getElementById("sName").value}</td></tr>
                    <tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px 0; color:#64748b;">FATHER'S NAME</td><td align="right" style="font-weight:700;">${document.getElementById("fName").value}</td></tr>
                    <tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px 0; color:#64748b;">MOBILE NUMBER</td><td align="right" style="font-weight:700;">${document.getElementById("mobile").value}</td></tr>
                    <tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px 0; color:#64748b;">AADHAR NO.</td><td align="right" style="font-weight:700;">${document.getElementById("aadhar").value}</td></tr>
                    <tr style="background:#f1f5f9;"><td style="padding:15px; font-weight:800; color:var(--primary);">TOTAL PAID</td><td align="right" style="padding:15px; font-weight:900; font-size:22px; color:var(--primary);">₹${basePrice - discountAmt}</td></tr>
                </table>

                <div style="margin-top:30px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:center;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${studentID}" style="border:1px solid #ddd; padding:5px; border-radius:5px;">
                        <p style="font-size:8px; margin-top:5px;">VERIFY ADMISSION</p>
                    </div>
                    <div style="text-align:right;">
                        <p style="font-size:12px; font-weight:800; margin-bottom:40px;">AUTHORIZED SIGNATORY</p>
                        <p style="font-size:10px; color:#64748b;">ABHINAY PRATAP (FOUNDER)</p>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("receiptData").innerHTML = html;
    }

    function downloadReceipt() {
        const content = document.getElementById("receiptData").innerHTML;
        const studentName = document.getElementById("sName").value || "STUDENT";
        const blob = new Blob([`<html><body style="margin:0; padding:20px;">${content}</body></html>`], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `AP_MATHS_RECEIPT_${studentName}.html`;
        link.click();
    }
</script>

</body>
</html>
