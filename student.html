<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMISSION PORTAL | AP MATHEMATICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --dark: #0f172a; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 850px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); border: 1px solid #e2e8f0; overflow: hidden; }
        .header { background: var(--dark); color: white; padding: 30px 20px; text-align: center; border-bottom: 6px solid var(--primary); }
        .header img { width: 85px; height: 85px; margin-bottom: 10px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
        .header h1 { font-size: 26px; letter-spacing: 2px; font-weight: 800; }
        .header p { font-size: 11px; color: #cbd5e1; margin-top: 5px; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 30px; }
        .full { grid-column: span 2; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; }
        input, select, textarea { padding: 12px 15px; border-radius: 10px; border: 2px solid #f1f5f9; background: #f8fafc; font-size: 13px; font-weight: 600; }
        .fee-status { background: #fff1f1; padding: 15px; border-radius: 12px; border: 2px dashed var(--primary); margin-top: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 35px; border-radius: 20px; max-width: 400px; width: 100%; text-align: center; }
        .qr-box { width: 200px; height: 200px; background: white; margin: 15px auto; border-radius: 12px; border: 1px solid #eee; padding: 8px; }
        .qr-box img { width: 100%; height: 100%; }
        .btn-pay { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; }
        #successCard { display: none; padding: 30px; text-align: center; }
        .receipt-container { text-align: left; background: white; border-radius: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <img src="alogo.png" id="mainLogo" alt="LOGO"> 
        <h1>AP MATHEMATICS</h1>
        <p>POWERED BY ABHINAY PRATAP MATHS</p>
    </div>
    <form id="admissionForm" class="form-grid">
        <div class="field full"><label>CHOOSE COURSE</label><select id="course" onchange="updateFee()"><option value="">-- SELECT BATCH --</option><option value="500">REGISTRATION FEE(₹499)</option><option value="2199">LAKSHYA BATCH (₹2199)</option><option value="2199">SANKALP BATCH (₹2199)</option><option value="3000" data-type="special">MATHS SPECIAL (₹4999)</option></select></div>
        <div class="field full"><label>COUPON CODE</label><div style="display:flex; gap:8px;"><input type="text" id="coupon" placeholder="MW10, HBD50" style="flex:1;"><button type="button" onclick="applyCoupon()" style="padding:0 15px; background:var(--dark); color:white; border-radius:10px; border:none; cursor:pointer;">APPLY</button></div></div>
        <div class="field full fee-status" id="feeDisplay" style="display:none"><div style="display:flex; justify-content:space-between; font-weight:800;"><span>PAYABLE FEE:</span><span id="finalPrice" style="color:var(--primary);">₹0</span></div></div>
        <div class="field"><label>STUDENT NAME</label><input type="text" id="sName"></div>
        <div class="field"><label>FATHER'S NAME</label><input type="text" id="fName"></div>
        <div class="field"><label>MOTHER'S NAME</label><input type="text" id="mName"></div>
        <div class="field"><label>DATE OF BIRTH</label><input type="date" id="dob"></div>
        <div class="field"><label>AADHAR NO.</label><input type="number" id="aadhar"></div>
        <div class="field"><label>MOBILE NO.</label><input type="number" id="mobile"></div>
        <div class="field"><label>VILLAGE</label><input type="text" id="village"></div>
        <div class="field"><label>STATE</label><select id="state"><option value="UTTAR PRADESH">UTTAR PRADESH</option><option value="BIHAR">BIHAR</option></select></div>
        <div class="field full"><label>FULL ADDRESS</label><textarea id="address" rows="2"></textarea></div>
        <button type="button" class="btn-pay full" onclick="openPayment()">PROCEED TO PAYMENT</button>
    </form>
</div>

<div class="modal" id="payModal">
    <div class="modal-content">
        <h2>SECURE PAYMENT</h2>
        <div class="qr-box"><img id="dynamicQR" src="" alt="QR"></div>
        <p id="qrAmountShow" style="font-weight:800; color:var(--primary); font-size:22px;">₹0</p>
        <input type="text" id="utr" placeholder="ENTER YOUR PAYMENT UTR" style="width:100%; text-align:center; border:2px solid var(--dark); text-transform:uppercase;">
        <button type="button" class="btn-pay" style="background:var(--success); margin-top:15px;" onclick="verifyAndSubmit()">CONFIRM ADMISSION</button>
        <button type="button" onclick="closeModal()" style="margin-top:10px; border:none; background:none; cursor:pointer;">CANCEL</button>
    </div>
</div>

<div class="container" id="successCard">
    <div style="color:var(--success); font-size:40px; margin-top:20px;">✔</div>
    <h2 style="font-weight:800;">ADMISSION CONFIRMED</h2>
    <div id="receiptData" class="receipt-container"></div>
    <div style="display:flex; gap:10px; margin:20px 30px;">
        <button class="btn-pay" onclick="downloadReceipt()" style="background:var(--dark); flex:1;">DOWNLOAD RECEIPT</button>
        <button class="btn-pay" onclick="location.reload()" style="background:#e2e8f0; color:#1e293b; flex:1;">CLOSE</button>
    </div>
</div>

<script>
    let basePrice = 0, discountAmt = 0, logoBase64 = "";

    // Image to Base64 (Prevents disappearing image on download)
    window.onload = function() {
        const img = document.getElementById('mainLogo');
        img.crossOrigin = "anonymous"; 
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            logoBase64 = canvas.toDataURL('image/png');
        };
    };

    function updateFee() {
        if(document.getElementById("course").value) {
            basePrice = parseInt(document.getElementById("course").value);
            document.getElementById("feeDisplay").style.display = "block";
            calculateTotal();
        }
    }

    function applyCoupon() {
        let code = document.getElementById("coupon").value.trim().toUpperCase();
        let courseSelect = document.getElementById("course");
        let isSpecial = courseSelect.options[courseSelect.selectedIndex].getAttribute('data-type') === 'special';
        if(code === "HBD50" && isSpecial) discountAmt = Math.round(basePrice * 0.5);
        else if(code.startsWith("MW")) {
            let num = parseInt(code.replace("MW", ""));
            if(num > 0 && num <= 100) discountAmt = Math.round(basePrice * (num/100));
        } else discountAmt = 0;
        calculateTotal();
    }

    function calculateTotal() {
        let final = basePrice - discountAmt;
        document.getElementById("finalPrice").innerText = "₹" + final;
        document.getElementById("dynamicQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('upi://pay?pa=7705042892@axl&pn=AP%20MATHEMATICS&am='+final+'&cu=INR')}`;
        document.getElementById("qrAmountShow").innerText = "PAY: ₹" + final;
    }

    function openPayment() {
        const fields = ["course", "sName", "fName", "mName", "dob", "aadhar", "mobile", "village", "state", "address"];
        for(let id of fields) { if(!document.getElementById(id).value.trim()){ alert("FIELD MISSING!"); return; } }
        document.getElementById("payModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("payModal").style.display = "none"; }

    function verifyAndSubmit() {
        let utr = document.getElementById("utr").value.trim().toUpperCase();
        if(utr.startsWith("MW") && utr.length === 14) {
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("payModal").style.display = "none";
            document.getElementById("successCard").style.display = "block";
            renderReceipt(utr);
        } else alert("INVALID UTR!");
    }

    function renderReceipt(utr) {
        let regID = "APM-" + Math.floor(100000 + Math.random() * 900000);
        let time = new Date().toLocaleString('en-IN');
        let html = `
            <div style="padding:25px; border:3px solid #0f172a; background:#fff; font-family:sans-serif; text-transform:uppercase;">
                <table style="width:100%; border-bottom:2px solid #d32f2f; padding-bottom:10px; margin-bottom:15px;">
                    <tr>
                        <td style="width:75px;"><img src="${logoBase64}" style="width:70px; height:70px; border-radius:50%; border:1px solid #000;"></td>
                        <td>
                            <h1 style="margin:0; font-size:22px; color:#0f172a;">AP MATHEMATICS</h1>
                            <p style="margin:2px 0; font-size:10px; font-weight:bold; color:#d32f2f;">POWERED BY ABHINAY PRATAP MATHS</p>
                        </td>
                    </tr>
                </table>
                <table style="width:100%; font-size:12px; line-height:2;">
                    <tr><td><b>REGISTRATION ID:</b></td><td align="right">${regID}</td></tr>
                    <tr><td><b>STUDENT NAME:</b></td><td align="right">${document.getElementById("sName").value}</td></tr>
                    <tr><td><b>FATHER'S NAME:</b></td><td align="right">${document.getElementById("fName").value}</td></tr>
                    <tr><td><b>MOTHER'S NAME:</b></td><td align="right">${document.getElementById("mName").value}</td></tr>
                    <tr><td><b>AADHAR NO:</b></td><td align="right">${document.getElementById("aadhar").value}</td></tr>
                    <tr style="background:#f1f5f9; color:#d32f2f;"><td><b>FEE PAID:</b></td><td align="right"><b>₹${basePrice - discountAmt}</b></td></tr>
                    <tr><td><b>UTR NO:</b></td><td align="right">${utr}</td></tr>
                    <tr><td><b>DATE:</b></td><td align="right">${time}</td></tr>
                </table>
                <div style="margin-top:20px; padding-top:10px; border-top:1px dashed #ccc; font-size:10px; text-align:center; color:#444;">
                    <p>📞 CALL: +91 9670078465 | 💬 WHATSAPP: +91 9670078465</p>
                    <p>📧 EMAIL: ABHINAYCHAUBEY83@GMAIL.COM</p>
                    <p>🌐 WEB: APMATHS.ONLINE</p>
                </div>
            </div>
        `;
        document.getElementById("receiptData").innerHTML = html;
    }

    function downloadReceipt() {
        const content = document.getElementById("receiptData").innerHTML;
        const blob = new Blob([`<html><body style="margin:0; padding:15px;">${content}</body></html>`], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `AP_Maths_Receipt_${document.getElementById("sName").value}.html`;
        link.click();
    }
</script>

</body>
</html>
