<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATHEMATICS | MCQ GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00ffd5; --bg: #020617; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; }
        
        /* Admin Section */
        .admin-panel { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #1e293b; color: white; font-size: 14px; }
        .btn { background: var(--primary); color: #000; padding: 15px; width: 100%; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .info-msg { font-size: 11px; color: #94a3b8; margin-bottom: 20px; text-align: center; }

        /* --- PRINT READY PAPER --- */
        #paper-output { display: none; background: white; color: black; padding: 15mm; width: 210mm; min-height: 297mm; margin: 20px auto; border: 1px solid #ddd; position: relative; }
        .header-print { text-align: center; border-bottom: 2px solid black; padding-bottom: 15px; margin-bottom: 20px; }
        .header-print h1 { margin: 0; font-size: 26px; font-weight: 900; }
        .header-print p { font-size: 14px; font-weight: 800; margin: 5px 0; }
        .test-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }

        .questions-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; margin-top: 10px; }
        .q-item { font-size: 11px; margin-bottom: 8px; page-break-inside: avoid; }
        .q-text { font-weight: 700; margin-bottom: 4px; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; padding-left: 15px; }
        .opt { font-size: 10px; }

        /* --- Updated Footer Styling --- */
        .paper-footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 2px solid black;
            text-align: center;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            page-break-inside: avoid;
        }

        @media print {
            body { background: white !important; padding: 0 !important; }
            .admin-panel { display: none !important; }
            #paper-output { display: block !important; margin: 0 !important; border: none !important; width: 100% !important; }
            @page { size: A4; margin: 10mm; }
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 5px;">MCQ TEST GENERATOR</h2>
    <p class="info-msg">Paste questions with options. Example: Question? [A] Opt1 [B] Opt2...</p>
    
    <input type="text" id="t-title" placeholder="Test Name (e.g. Weekly Quiz - 01)">
    <div style="display: flex; gap: 10px;">
        <input type="text" id="t-sub" placeholder="Subject">
        <input type="text" id="t-marks" placeholder="M.M. (Marks)">
    </div>
    <input type="text" id="t-time" placeholder="Time (e.g. 60 Minutes)">
    
    <textarea id="raw-questions" rows="12" placeholder="Paste Questions here. Format:
1. What is 2+2? (A) 3 (B) 4 (C) 5 (D) 6
2. Another Question? (A) Yes (B) No..."></textarea>
    
    <button class="btn" onclick="generateMCQ()">GENERATE & DOWNLOAD PDF</button>
</div>

<div id="paper-output">
    <div class="header-print">
        <h1>AP MATHEMATICS INSTITUTE</h1>
        <p id="p-title"></p>
        <div class="test-meta">
            <span id="p-sub"></span>
            <span id="p-time"></span>
            <span id="p-marks"></span>
        </div>
    </div>
    <div class="questions-container" id="q-list"></div>
    
    <div class="paper-footer">
        ABHINAY PRATAP (MATHS MYSTIC)
    </div>
</div>

<script>
    function generateMCQ() {
        const title = document.getElementById('t-title').value;
        const sub = document.getElementById('t-sub').value;
        const marks = document.getElementById('t-marks').value;
        const time = document.getElementById('t-time').value;
        const rawData = document.getElementById('raw-questions').value;

        if(!rawData) return alert("Bhai questions toh daalo!");

        document.getElementById('p-title').innerText = title;
        document.getElementById('p-sub').innerText = "SUBJECT: " + sub;
        document.getElementById('p-time').innerText = "TIME: " + time;
        document.getElementById('p-marks').innerText = "MARKS: " + marks;

        // Smart Parsing
        const qLines = rawData.split('\n').filter(line => line.trim() !== "");
        let html = "";

        qLines.forEach((line, i) => {
            // Regex to separate question and options
            const parts = line.split(/\(([A-D])\)/g);
            const qBody = parts[0].replace(/^\d+\.\s*/, ''); // Remove existing numbers
            
            html += `
            <div class="q-item">
                <span class="q-text">Q.${i+1}. ${qBody}</span>
                <div class="options-grid">
                    <div class="opt">(A) ${parts[2] || '___'}</div>
                    <div class="opt">(B) ${parts[4] || '___'}</div>
                    <div class="opt">(C) ${parts[6] || '___'}</div>
                    <div class="opt">(D) ${parts[8] || '___'}</div>
                </div>
            </div>`;
        });

        document.getElementById('q-list').innerHTML = html;
        document.getElementById('paper-output').style.display = 'block';
        
        // Open Chrome Print Dialog
        window.print();
    }
</script>

</body>
</html>
