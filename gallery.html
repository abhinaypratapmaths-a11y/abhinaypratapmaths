<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP MATHEMATICS GALLERY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 { 
            padding: 30px; 
            color: #f8fafc;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Gallery Layout - Auto Height (Masonry Style) */
        .gallery {
            column-count: 3; /* Desktop par 3 columns */
            column-gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } }

        /* Container for Image + Strip */
        .image-container {
            break-inside: avoid;
            margin-bottom: 25px;
            position: relative;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #334155;
        }

        .image-container:hover {
            transform: translateY(-5px);
            border-color: #fbbf24; /* Hover par yellow border */
        }

        /* Yellow Strip - Image Size Ke Hisaab Se */
        .yellow-strip {
            background: #fbbf24; /* Yellow Color */
            color: #000; /* Text Black for contrast */
            padding: 6px 0;
            font-size: 13px;
            font-weight: 700;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .image-container img {
            width: 100%;
            height: auto; /* Apne original size mein dikhega */
            display: block;
            cursor: pointer;
        }

        /* Popup Styling */
        .popup {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .popup img {
            max-width: 95%;
            max-height: 75vh;
            border-radius: 8px;
            border: 3px solid #fbbf24;
            object-fit: contain;
        }

        .controls { margin-top: 25px; }

        button {
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .prev, .next { background: #2563eb; color: white; }
        .download { background: #16a34a; color: white; }
        .close { background: #ef4444; color: white; }

        button:hover { opacity: 0.8; transform: scale(1.05); }

    </style>
</head>
<body>

    <h2>AP MATHEMATICS GALLERY</h2>

    <div class="gallery" id="gallery">
        </div>

    <div class="popup" id="popup">
        <img id="popupImg">
        <div class="controls">
            <button class="prev" onclick="prevImg()">← Previous</button>
            <button class="next" onclick="nextImg()">Next →</button>
            <button class="download" onclick="downloadImg()">Download Now</button>
            <button class="close" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        // Images ke path yahan badlein
        const images = [
            "images/img1.jpg",
            "images/img2.jpg",
           
        ];

        const gallery = document.getElementById("gallery");
        const popup = document.getElementById("popup");
        const popupImg = document.getElementById("popupImg");

        let current = 0;

        // Gallery Items Create Karna
        images.forEach((src, index) => {
            const container = document.createElement("div");
            container.className = "image-container";

            const strip = document.createElement("div");
            strip.className = "yellow-strip";
            strip.innerText = "AP Mathematics Gallery";

            const img = document.createElement("img");
            img.src = src;
            img.onclick = () => {
                current = index;
                showImg();
            };

            container.appendChild(strip);
            container.appendChild(img);
            gallery.appendChild(container);
        });

        function showImg() {
            popup.style.display = "flex";
            popupImg.src = images[current];
            document.body.style.overflow = "hidden"; 
        }

        function closePopup() {
            popup.style.display = "none";
            document.body.style.overflow = "auto";
        }

        function nextImg() {
            current = (current + 1) % images.length;
            showImg();
        }

        function prevImg() {
            current = (current - 1 + images.length) % images.length;
            showImg();
        }

        // Professional Download Function for Students
        function downloadImg() {
            const imgSrc = images[current];
            const fileName = "AP_Maths_" + (current + 1) + ".jpg";
            
            fetch(imgSrc)
                .then(res => res.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                })
                .catch(() => {
                    // Fallback agar fetch fail ho jaye
                    const a = document.createElement("a");
                    a.href = imgSrc;
                    a.download = fileName;
                    a.target = "_blank";
                    a.click();
                });
        }

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closePopup();
            if (e.key === "ArrowRight") nextImg();
            if (e.key === "ArrowLeft") prevImg();
        });
    </script>

</body>
</html>
